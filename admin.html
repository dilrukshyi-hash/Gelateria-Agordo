<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard | Gelatariya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-[#F8F9FA] min-h-screen pt-32 cursor-none">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-12">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-16">
            <div data-aos="fade-right">
                <span class="text-strawberry font-bold uppercase tracking-[0.2em] text-xs mb-3 block">Accesso Riservato</span>
                <h1 class="text-6xl font-black text-gray-900 leading-tight">Centro di <span class="reveal-text">Comando Negozio</span></h1>
            </div>
            <button onclick="openModal()" class="bg-gray-900 text-white px-10 py-5 rounded-[2rem] font-bold flex items-center gap-4 hover:bg-strawberry transition-all shadow-2xl hover:shadow-strawberry/40 group active:scale-95" data-aos="fade-left">
                <div class="bg-white/20 p-2 rounded-full group-hover:rotate-90 transition-transform"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg></div>
                Aggiungi Gusto
            </button>
        </div>


        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-20" data-aos="fade-up">
            <div class="glass-card p-12 bg-white border-none shadow-2xl flex items-center gap-10 group">
                <div class="bg-strawberry/10 p-6 rounded-[2rem] group-hover:bg-strawberry/20 transition-colors"><svg class="w-12 h-12 text-strawberry" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.172-1.172a4 4 0 115.656 5.656L15 13"></path></svg></div>
                <div><p class="text-gray-400 font-bold uppercase tracking-widest text-xs mb-2">Inventario</p><h2 id="total-flavors" class="text-4xl font-black">0</h2></div>

            </div>

            <div class="glass-card p-10 bg-white border-none shadow-xl flex items-center gap-8">
                <div class="bg-mint/20 p-5 rounded-3xl"><svg class="w-10 h-10 text-mint" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
                <div><p class="text-gray-400 font-medium">I Più Venduti</p><h2 id="total-bestsellers" class="text-3xl font-black">0</h2></div>

            </div>
            <div class="glass-card p-10 bg-white border-none shadow-xl flex items-center gap-8">
                <div class="bg-accent/20 p-5 rounded-3xl"><svg class="w-10 h-10 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0l-8 8-8-8"></path></svg></div>
                <div><p class="text-gray-400 font-medium">Messaggi</p><h2 id="total-messages" class="text-3xl font-black">0</h2></div>

            </div>
        </div>

        <!-- Product Table -->
        <div class="glass-card bg-white p-8 border-none shadow-xl overflow-hidden mb-20">
            <h3 class="text-2xl font-bold mb-8 flex items-center gap-4">Menu Attuale <span class="px-3 py-1 bg-gray-100 rounded-lg text-sm font-normal text-gray-500" id="table-count">0 gusti</span></h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-gray-100 text-gray-400 text-sm font-semibold uppercase tracking-wider">
                            <th class="pb-6 px-4">Gusto</th>
                            <th class="pb-6">Categoria</th>
                            <th class="pb-6">Prezzo</th>
                            <th class="pb-6 text-center">Stato</th>
                            <th class="pb-6 text-right px-4">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-table" class="divide-y divide-gray-50">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal (Breathtaking Overlay) -->
    <div id="product-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-md hidden transition-opacity duration-300">
        <div class="glass-card bg-white w-full max-w-2xl p-10 border-none shadow-2xl scale-95 transition-transform duration-300" id="modal-container">
            <div class="flex justify-between items-center mb-8">
                <h2 id="modal-title" class="text-3xl font-black text-gray-900">Aggiungi Nuovo Gusto</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition-colors"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <form id="product-form" class="space-y-6">
                <input type="hidden" id="pid">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Nome del Gusto</label>
                        <input id="pname" type="text" required placeholder="es. Cielo di Vaniglia" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-100 focus:ring-2 focus:ring-strawberry outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Categoria</label>
                        <select id="pcategory" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-100 focus:ring-2 focus:ring-strawberry outline-none">
                            <option>Classici</option>
                            <option>Frutta</option>
                            <option>Tropicali</option>
                            <option>Rinfrescanti</option>
                            <option>Speciali</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Prezzo (€)</label>
                        <input id="pprice" type="number" step="0.01" required placeholder="5.00" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-100 focus:ring-2 focus:ring-strawberry outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">URL Immagine (Opzionale)</label>
                        <input id="pimage" type="text" placeholder="https://..." class="w-full p-4 rounded-xl bg-gray-50 border border-gray-100 focus:ring-2 focus:ring-strawberry outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Descrizione</label>
                    <textarea id="pdesc" rows="3" placeholder="Descrivi la dolcezza..." class="w-full p-4 rounded-xl bg-gray-50 border border-gray-100 focus:ring-2 focus:ring-strawberry outline-none"></textarea>
                </div>
                <div class="flex items-center gap-4">
                    <input type="checkbox" id="pisBestSeller" class="w-5 h-5 accent-strawberry">
                    <label class="text-sm font-bold text-gray-700">Imposta come Best Seller</label>
                </div>
                <button type="submit" class="w-full bg-strawberry text-white font-bold h-16 rounded-2xl shadow-xl shadow-strawberry/30 hover:shadow-strawberry/40 hover:-translate-y-1 transition-all">Salva Modifiche</button>
            </form>
        </div>
    </div>


    <!-- Scripts -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await initializeAdmin();
        });

        async function initializeAdmin() {
            setTimeout(async () => {
                await loadTable();
            }, 500);
        }

        async function loadTable() {
            const table = document.getElementById('admin-product-table');
            const products = await window.gelatoDB.getAll('products');
            const messages = await window.gelatoDB.getAll('messages');

            // Update stats
            document.getElementById('total-flavors').textContent = products.length;
            document.getElementById('total-bestsellers').textContent = products.filter(p => p.isBestSeller).length;
            document.getElementById('total-messages').textContent = messages.length;
            document.getElementById('table-count').textContent = `${products.length} gusti`;

            table.innerHTML = products.map(p => `
                <tr class="hover:bg-gray-50/50 transition-all">
                    <td class="py-6 px-4">
                        <div class="flex items-center gap-4">
                            <img src="${p.image || 'https://images.unsplash.com/photo-1570197788417-0e82375c9371?w=100'}" class="w-12 h-12 rounded-xl object-cover shadow-md">
                            <span class="font-bold text-gray-800">${p.name}</span>
                        </div>
                    </td>
                    <td class="py-6"><span class="px-3 py-1 bg-gray-50 text-gray-500 rounded-lg text-xs font-bold uppercase">${p.category}</span></td>
                    <td class="py-6 font-bold text-gray-900">€ ${p.price.toFixed(2)}</td>
                    <td class="py-6 text-center">
                        ${p.isBestSeller ? '<span class="px-3 py-1 bg-green-100 text-green-600 rounded-lg text-xs font-bold uppercase tracking-tight">Best Seller Attivo</span>' : '<span class="text-gray-300 text-xs">-</span>'}
                    </td>
                    <td class="py-6 text-right px-4 space-x-3">
                        <button onclick='editProduct(${p.id})' class="p-2 border border-gray-100 rounded-lg text-gray-400 hover:text-strawberry hover:border-strawberry transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                        <button onclick='deleteProduct(${p.id})' class="p-2 border border-gray-100 rounded-lg text-gray-400 hover:text-red-500 hover:border-red-500 transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m4-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </td>
                </tr>
            `).join('');
        }

        const modal = document.getElementById('product-modal');
        const mContent = document.getElementById('modal-container');
        const form = document.getElementById('product-form');

        function openModal() {
            document.getElementById('modal-title').textContent = "Aggiungi Nuovo Gusto";
            form.reset();
            document.getElementById('pid').value = "";
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.add('opacity-100'); mContent.classList.add('scale-100'); }, 10);
        }

        function closeModal() {
            modal.classList.remove('opacity-100');
            mContent.classList.remove('scale-100');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        async function editProduct(id) {
            const all = await window.gelatoDB.getAll('products');
            const p = all.find(x => x.id === id);
            if (!p) return;

            document.getElementById('modal-title').textContent = "Modifica Gusto";
            document.getElementById('pid').value = p.id;
            document.getElementById('pname').value = p.name;
            document.getElementById('pcategory').value = p.category;
            document.getElementById('pprice').value = p.price;
            document.getElementById('pimage').value = p.image || '';
            document.getElementById('pdesc').value = p.description;
            document.getElementById('pisBestSeller').checked = p.isBestSeller;

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.add('opacity-100'); mContent.classList.add('scale-100'); }, 10);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('pname').value,
                category: document.getElementById('pcategory').value,
                price: Number(document.getElementById('pprice').value),
                image: document.getElementById('pimage').value || 'https://images.unsplash.com/photo-1570197788417-0e82375c9371?w=400',
                description: document.getElementById('pdesc').value,
                isBestSeller: document.getElementById('pisBestSeller').checked
            };

            const id = document.getElementById('pid').value;
            if (id) {
                data.id = Number(id);
                await window.gelatoDB.update('products', data);
                window.showAlert("Gusto Aggiornato!");
            } else {
                await window.gelatoDB.add('products', data);
                window.showAlert("Nuovo Gusto Aggiunto!");
            }
            closeModal();
            loadTable();
        };

        async function deleteProduct(id) {
            if (confirm("Sei sicuro di voler rimuovere questo gusto?")) {
                await window.gelatoDB.delete('products', id);
                window.showAlert("Gusto Rimosso.", "error");
                loadTable();
            }
        }

    </script>
</body>
</html>
